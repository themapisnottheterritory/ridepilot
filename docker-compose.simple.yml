version: '3'
volumes:  
  postgres_data:
  redis:
services:
  db:    
    image: mdillon/postgis:9.4
    volumes:      
      - postgres_data:/var/lib/postgresql/data 
    ports: 
      - 5432:5432

  redis:
    image: 'redis:4.0-alpine'
    volumes:
      - redis:/data

  app:    
    build:      
      context: .      
      dockerfile: ./docker/app/Dockerfile    
    depends_on:      
      - db  
      - redis
    env_file:
      - ./docker/.env
    environment:      
      PSYCH_ENABLE_ALIASES: "true"  # Enables YAML alias parsing
    ports:
      - 3000:3000
    volumes:
      - .:/var/www/ridepilot
    command: bundle exec rails server -b 0.0.0.0